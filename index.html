<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shalini Singh — Content Architect</title>
    
    <!-- FONTS: Syne for Modernity, Instrument Serif for Elegance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --sky:         #B8DFEF;
            --blush-deep:  #D45E7A;
            --yellow:      #FAE083;
            --cream:       #FAF7F2;
            --ink:         #1C1826;
            --ink-soft:    #4A4462;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--cream);
            color: var(--ink);
            font-family: 'Syne', sans-serif;
            overflow: hidden; 
            cursor: none; 
            -webkit-font-smoothing: antialiased;
        }

        /* CUSTOM CURSOR */
        #cursor-dot {
            position: fixed;
            width: 8px; height: 8px;
            background: var(--blush-deep);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }
        #cursor-ring {
            position: fixed;
            width: 34px; height: 34px;
            border: 1.5px solid var(--ink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            will-change: transform;
        }

        /* NAV - MINIMALIST */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 22px; text-decoration: none; color: var(--ink); letter-spacing: -1px; }
        .logo span { color: var(--blush-deep); }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { font-size: 12px; font-weight: 700; color: var(--ink); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }

        /* HERO LAYOUT */
        .hero {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            height: 100vh;
            align-items: center;
            padding-left: 80px;
            position: relative;
        }

        /* LEFT CONTENT: TYPOGRAPHY FOCUSED */
        .hero-left { z-index: 10; position: relative; }
        
        h1 { 
            font-size: clamp(50px, 6.5vw, 90px); 
            line-height: 0.9; 
            letter-spacing: -3px; 
            margin-bottom: 25px;
        }
        h1 i { 
            font-family: 'Instrument Serif', serif; 
            font-style: italic; 
            font-weight: 400; 
            display: block; 
            color: var(--ink);
            letter-spacing: 0;
            font-size: 0.8em;
            margin-bottom: 10px;
        }
        .name-highlighter { position: relative; color: var(--blush-deep); display: inline-block; }
        .name-highlighter::after {
            content: ''; position: absolute; bottom: 12%; left: 0; width: 100%; height: 32%;
            background: var(--yellow); z-index: -1; transform: scaleX(0); transform-origin: left;
            animation: highlight 0.8s cubic-bezier(.65,0,.35,1) 1s forwards;
        }

        .tagline { 
            font-size: clamp(18px, 2.2vw, 26px); 
            font-weight: 700;
            color: var(--ink-soft); 
            max-width: 550px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .btn-wrap { margin-top: 50px; }
        .btn-work { 
            padding: 20px 40px; 
            border-radius: 12px; 
            font-weight: 800; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 13px; 
            border: 2.5px solid var(--ink); 
            background: var(--yellow); 
            color: var(--ink); 
            box-shadow: 6px 6px 0 var(--ink);
            transition: 0.2s;
            display: inline-block;
        }
        .btn-work:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--ink); }

        /* RIGHT CONTENT */
        .hero-right {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* THE BREATHING MORPHING BLOB */
        .photo-blob {
            width: 480px; height: 580px;
            background: linear-gradient(160deg, var(--sky) 0%, #F2BDCA 50%, var(--yellow) 100%);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 8s ease-in-out infinite;
            overflow: hidden;
            position: relative;
            z-index: 5;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
        }
        .photo-blob img {
            width: 100%; height: 100%;
            object-fit: cover;
            content: url('portrait/shalini-portrait.jpg'); 
        }

        /* THE 3D CHARACTER - FLOATING FREELY */
        .char-floating-box {
            position: absolute;
            bottom: -5%;
            right: -10%;
            width: 550px;
            height: 650px;
            z-index: 20;
            pointer-events: none;
            overflow: hidden; /* Helps clip any remaining box edges */
        }
        .char-floating-box iframe { 
            width: 100%; height: 110%; /* Slightly taller to push logo off-screen */
            border: none; 
            background: transparent;
            /* LOGO HIDING TRICK: Mask the bottom edge where the logo sits */
            -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 90%);
            mask-image: linear-gradient(to bottom, black 90%, transparent 90%);
        }

        /* ANIMATIONS */
        @keyframes morph {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        }
        @keyframes highlight { to { transform: scaleX(1); } }

        /* RESPONSIVE */
        @media (max-width: 1100px) {
            .hero { grid-template-columns: 1fr; padding: 140px 30px; text-align: center; height: auto; }
            .hero-left { display: flex; flex-direction: column; align-items: center; padding-left: 0; }
            .photo-blob { width: 320px; height: 420px; margin-top: 60px; }
            .char-floating-box { width: 340px; height: 440px; right: 0; bottom: -40px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <nav>
        <a href="#" class="logo">Shalini <span>Singh.</span></a>
        <div class="nav-links">
            <a href="#">Projects</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <main class="hero">
        <section class="hero-left">
            <h1>
                <i>Hello, my name</i>
                is <span class="name-highlighter">Shalini Singh.</span>
            </h1>
            <p class="tagline">A Content strategist who turns scrolls into stops and stories into strategies.</p>
            
            <div class="btn-wrap">
                <a href="#" class="btn btn-work">View My Work →</a>
            </div>
        </section>

        <section class="hero-right">
            <!-- PORTRAIT BLOB -->
            <div class="photo-blob" id="mainPhoto">
                <img src="portrait/shalini-portrait.jpg" alt="Shalini Singh Portrait">
            </div>

            <!-- JUMPING CHARACTER (CLEAN & TRANSPARENT) -->
            <div class="char-floating-box" id="jumpChar">
                <iframe src='https://my.spline.design/untitled-iy0o5rVCRsVbo9ISvylEUktE/' 
                        frameborder='0' 
                        allowtransparency="true"></iframe>
            </div>
        </section>
    </main>

    <script>
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        
        window.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';

            // --- SUBTLE PARALLAX FOR DEPTH ---
            const char = document.getElementById('jumpChar');
            const photo = document.getElementById('mainPhoto');
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            
            char.style.transform = `translate(${x * -1.8}px, ${y * -1.8}px)`;
            photo.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Cursor scaling
        document.querySelectorAll('a, .btn-work').forEach(item => {
            item.addEventListener('mouseenter', () => {
                ring.style.width = '60px'; ring.style.height = '60px';
                ring.style.background = 'rgba(212, 94, 122, 0.08)';
            });
            item.addEventListener('mouseleave', () => {
                ring.style.width = '34px'; ring.style.height = '34px';
                ring.style.background = 'transparent';
            });
        });
    </script>
</body>
</html>
