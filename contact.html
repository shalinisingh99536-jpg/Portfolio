<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact â€” Shalini Singh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --font-display: 'Fraunces', serif;
      --font-body: 'Syne', sans-serif;
      --sky: #B8DFEF;
      --sky-light: #E4F3FA;
      --sky-deep: #5A9FC2;
      --blush: #F2BDCA;
      --blush-light: #FDE8EE;
      --blush-deep: #D45E7A;
      --yellow: #FAE083;
      --yellow-light: #FEF7D6;
      --yellow-deep: #C8940A;
      --sage: #C5E8D5;
      --lavender: #D8CEFF;
      --cream: #FAF7F2;
      --ink: #1C1826;
      --ink-soft: #4A4462;
      --ink-muted: #928EA8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--cream);
      
      color: var(--ink);
      overflow-x: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    /* CURSOR */
    #cur {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--blush-deep);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: multiply;
      transition: width .22s, height .22s;
      will-change: transform;
    }

    #cur-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 2px solid var(--sky-deep);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      opacity: .4;
      transition: width .28s, height .28s, opacity .28s;
      will-change: transform;
    }

    #cur.big {
      width: 42px;
      height: 42px;
      opacity: .1;
    }

    #cur-ring.big {
      width: 58px;
      height: 58px;
      opacity: .08;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 600;
      padding: 22px 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background .4s, box-shadow .4s;
    }

    nav.scrolled {
      background: rgba(250, 247, 242, .92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 rgba(28, 24, 38, .08);
    }

    .nav-logo {
      font-weight: 800;
      font-size: 19px;
      letter-spacing: -.01em;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .nav-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blush-deep);
      flex-shrink: 0;
      animation: pipPulse 2.5s ease-in-out infinite;
    }

    @keyframes pipPulse {
      0%,
      100% {
        background: var(--blush-deep);
        transform: scale(1);
      }

      50% {
        background: var(--sky-deep);
        transform: scale(1.45);
      }
    }

    .nav-logo em {
      
      color: var(--blush-deep);
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      position: relative;
      padding-bottom: 3px;
      transition: color .25s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--blush-deep);
      border-radius: 2px;
      transition: width .3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--blush-deep);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }

    /* PAGE LAYOUT */
    body {
      overflow: hidden; /* Strict no scroll on contact page */
    }
    #contact-section {
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      position: relative;
      background: var(--cream);
    }

    /* LEFT : Typography & Quote */
    .contact-left {
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid rgba(0, 0, 0, 0.05);
      background: linear-gradient(135deg, var(--blush-light) 0%, var(--cream) 100%);
      position: relative;
      overflow: hidden;
    }
    
    .contact-left::after {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: var(--sky-light);
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
    }
    .contact-left > * { position: relative; z-index: 2; }

    .c-h1 {
      
      font-weight: 800;
      font-size: clamp(48px, 6vw, 84px);
      letter-spacing: -0.03em;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 24px;
    }

    .c-h1 em {
      
      font-weight: 400;
      
      color: var(--blush-deep);
      display: block;
    }

    .marketing-quote {
      
      
      font-size: clamp(24px, 3vw, 32px);
      color: var(--ink-soft);
      line-height: 1.4;
      max-width: 460px;
      position: relative;
    }

    .marketing-quote::before {
      content: '"';
      
      font-size: 80px;
      color: var(--yellow);
      position: absolute;
      top: -30px;
      left: -30px;
      opacity: 0.5;
      z-index: -1;
    }

    .quote-author {
      
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: block;
      margin-top: 16px;
    }

    .social-links {
      display: flex;
      gap: 24px;
      margin-top: 40px;
    }

    .social-links a {
      
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      position: relative;
    }
    
    .social-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--ink);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.4s ease;
    }

    .social-links a:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }


    /* RIGHT : Form + Video */
    .contact-right {
      padding: 40px 80px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: var(--cream);
    }

    .form-wrapper {
      max-width: 520px;
      width: 100%;
      position: relative;
      z-index: 10;
      background: #fff;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.03);
    }

    .input-group {
      margin-bottom: 32px;
      position: relative;
    }

    .input-group input,
    .input-group textarea,
    .input-group select {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(28, 24, 38, 0.15);
      padding: 14px 0 10px;
      
      font-size: 26px;
      
      color: var(--ink);
      transition: border-color 0.3s ease;
      resize: none;
    }

    .input-group select {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      
      font-size: 16px;
      font-weight: 700;
      
    }

    .input-group input:focus,
    .input-group textarea:focus,
    .input-group select:focus {
      outline: none;
      border-bottom-color: var(--blush-deep);
    }

    .input-group label {
      position: absolute;
      top: 14px;
      left: 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      pointer-events: none;
      transition: transform 0.3s ease, font-size 0.3s ease, color 0.3s ease;
    }

    /* Floating label effect */
    .input-group input:focus+label,
    .input-group input:not(:placeholder-shown)+label,
    .input-group textarea:focus+label,
    .input-group textarea:not(:placeholder-shown)+label {
      transform: translateY(-26px);
      font-size: 10px;
      color: var(--blush-deep);
    }
    
    .static-label {
      transform: translateY(-26px) !important;
      font-size: 10px !important;
      color: var(--blush-deep) !important;
    }

    .btn-main {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 40px;
      border-radius: 8px;
      
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-decoration: none;
      background: var(--yellow);
      color: var(--ink);
      border: 2px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      transition: transform .18s ease, box-shadow .18s ease, background .25s ease;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }

    .btn-main:hover {
      background: var(--sky);
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .btn-main:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--ink);
    }

    /* Animated Character Element */
    .video-corner-wrap {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 400px;
      height: 400px;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: multiply;
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      padding-right: 40px;
    }

    .video-corner-wrap video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      animation: floatIn 1.5s ease-out forwards;
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: translateY(40px) translateX(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) translateX(0);
      }
    }


    /* RESPONSIVE */
    @media(max-width: 960px) {
      nav { padding: 18px 24px; }
      #contact-section { grid-template-columns: 1fr; }
      .contact-left, .contact-right { padding: 120px 40px 60px; border-right: none; }
      .contact-right { padding-top: 60px; }
      .video-corner-wrap { width: 300px; height: 300px; right: 0; opacity: 0.5; z-index: 0; }
    }
    @media(max-width: 520px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; } /* Quick mobile fix for nav */
      .c-h1 { font-size: 40px; }
      .marketing-quote { font-size: 20px; }
      .video-corner-wrap { bottom: -50px; opacity: 0.3; }
    }
      /* GLOBAL FONT RULES */
    body, p, span, a, li, .nav-links a, .nav-logo, .role-badge, .bio-text, .sc-desc, .skill-desc, .tagline, .description, button, .pill, label, caption, footer, .f-desc, .f-col h4, .f-col a, .f-col p, .f-bottom {
      font-family: var(--font-body) !important; letter-spacing: 0.01em !important; line-height: 1.75 !important; -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4, .about-title, .hero-name, .section-title, .btt-title, .f-logo, .sc-title, .skill-title, .brands-heading, .sn-h2, .metrics-h2 {
      font-family: var(--font-display) !important; letter-spacing: -0.02em !important; line-height: 1.05 !important; -webkit-font-smoothing: antialiased;
    }
    .nav-logo { font-family: var(--font-display) !important; font-weight: 800 !important; font-size: 19px !important; letter-spacing: -0.01em !important; }
    /* CONTACT */
    .contact-heading { font-family: var(--font-display) !important; font-weight: 800; }
    label, input, textarea { font-family: var(--font-body) !important; }

  </style>
</head>

<body>

  <div id="cur"></div>
  <div id="cur-ring"></div>

  <nav id="mainNav">
    <a href="index.html" class="nav-logo">
      <span class="nav-pip"></span>
      Shalini <em>Singh</em>
    </a>
    <div class="nav-links">
      <a href="index.html#about-section">About Me</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <section id="contact-section">
    <!-- LEFT -->
    <div class="contact-left">
      <h1 class="c-h1">Let's build <em>something</em> real.</h1>

      <!-- Underrated Marketing Quote -->
      <div style="margin-top:20px;">
        <p class="marketing-quote">
          Good marketing makes the company look smart. Great marketing makes the customer feel smart.
        </p>
        <span class="quote-author">&mdash; Joe Chernov</span>
      </div>

      <div class="social-links">
        <a href="https://www.instagram.com/shalinistuff/" target="_blank">Instagram</a>
        <a href="https://www.linkedin.com/in/shalini-singh-953747151" target="_blank">LinkedIn</a>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="contact-right">
      
      <div class="form-wrapper">
        <!-- Formspree Integration -->
        <form action="https://formspree.io/f/xykbprbo" method="POST">
          
          <div class="input-group">
            <input type="text" id="name" name="name" required placeholder=" " autocomplete="name">
            <label for="name">Your Name</label>
          </div>

          <div class="input-group">
            <input type="email" id="email" name="email" required placeholder=" " autocomplete="email">
            <label for="email">Your Email</label>
          </div>

          <div class="input-group">
            <select id="reason" name="reason" required>
              <option value="" disabled selected>Select one</option>
              <option value="Freelance project">Freelance project</option>
              <option value="Full-time opportunity">Full-time opportunity</option>
              <option value="Collaboration">Collaboration</option>
              <option value="Just saying hi">Just saying hi</option>
            </select>
            <label for="reason" class="static-label">WHAT'S THIS ABOUT?</label>
            <!-- Custom dropdown arrow matching exactly your brand -->
            <div style="position: absolute; right: 0; top: 16px; pointer-events: none;">
              <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1.5L6 6.5L11 1.5" stroke="var(--ink)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <div class="input-group" style="margin-bottom:24px;">
            <textarea id="message" name="message" rows="3" required placeholder=" "></textarea>
            <label for="message">How can I help you?</label>
          </div>

          <!-- Hidden Formspree config subject line -->
          <input type="hidden" name="_subject" value="New Portfolio Inquiry!">

          <button type="submit" class="btn-main">Send Message &#8594;</button>
        </form>
      </div>

      </div>
  </section>

  <script>
    /* CURSOR */
    const cur = document.getElementById("cur"), ring = document.getElementById("cur-ring");
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; cur.style.left = mx + "px"; cur.style.top = my + "px"; });
    (function loop() { rx += (mx - rx) * .12; ry += (my - ry) * .12; ring.style.left = rx + "px"; ring.style.top = ry + "px"; requestAnimationFrame(loop); })();
    document.querySelectorAll("a, button, input, textarea").forEach(el => {
      el.addEventListener("mouseenter", () => { cur.classList.add("big"); ring.classList.add("big"); });
      el.addEventListener("mouseleave", () => { cur.classList.remove("big"); ring.classList.remove("big"); });
    });

    /* NAV SCROLL */
    window.addEventListener("scroll", () => {
      document.getElementById("mainNav").classList.toggle("scrolled", window.scrollY > 24);
    }, { passive: true });
  </script>

</body>

</html>
